<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member hub - AgenticAdvertising.org</title>
  <link rel="icon" href="/addie-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/design-system.css">
  <style>
    body {
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--color-primary-100) 65%, white) 0%, transparent 32%),
        linear-gradient(180deg, #fcfdff 0%, var(--color-bg-page) 22%, var(--color-bg-page) 100%);
      padding-top: var(--nav-height);
    }

    .hub-container {
      max-width: var(--container-xl);
      margin: 0 auto;
      padding: var(--space-8) var(--space-4);
    }

    .hub-kicker {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      background: color-mix(in srgb, var(--color-primary-100) 78%, white);
      color: var(--color-brand);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wider);
      margin-bottom: var(--space-4);
    }

    /* =========================================================================
       Header
       ========================================================================= */
    .hub-header {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.8fr);
      gap: var(--space-6);
      margin-bottom: var(--space-6);
      align-items: stretch;
    }

    .hub-header-left { flex: 1; min-width: 0; }

    .hub-hero-card,
    .hub-focus-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid color-mix(in srgb, var(--color-border) 88%, white);
      border-radius: calc(var(--card-radius) + 4px);
      box-shadow: 0 16px 40px rgba(16, 24, 40, 0.06);
    }

    .hub-hero-card {
      padding: var(--space-8);
      position: relative;
      overflow: hidden;
    }

    .hub-hero-card::after {
      content: '';
      position: absolute;
      right: -80px;
      top: -60px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--color-primary-100) 72%, white) 0%, transparent 70%);
      pointer-events: none;
    }

    .hub-header h1 {
      font-size: clamp(2rem, 4vw, 3.25rem);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
      margin-bottom: var(--space-3);
      line-height: var(--leading-tight);
      letter-spacing: var(--tracking-tight);
      max-width: 14ch;
      position: relative;
      z-index: 1;
    }

    .hub-lede {
      font-size: var(--text-lg);
      line-height: var(--leading-relaxed);
      color: var(--color-text-secondary);
      max-width: 62ch;
      margin-bottom: var(--space-5);
      position: relative;
      z-index: 1;
    }

    .hub-header-meta {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-6);
      position: relative;
      z-index: 1;
    }

    .hub-meta-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      background: var(--color-bg-subtle);
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      border: 1px solid color-mix(in srgb, var(--color-border) 86%, white);
    }

    .hub-hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      position: relative;
      z-index: 1;
    }

    .hub-hero-actions .btn {
      min-height: 42px;
    }

    .hub-focus-card {
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        linear-gradient(160deg, color-mix(in srgb, var(--color-primary-50) 90%, white) 0%, #ffffff 100%);
    }

    .hub-focus-label {
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wider);
      color: var(--color-brand);
      margin-bottom: var(--space-3);
    }

    .hub-focus-title {
      font-size: var(--text-2xl);
      line-height: var(--leading-tight);
      color: var(--color-text-heading);
      margin-bottom: var(--space-3);
    }

    .hub-focus-copy {
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-5);
    }

    .hub-focus-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      background: var(--color-primary-100);
      color: var(--color-brand);
    }

    .level-badge-num {
      font-size: var(--text-xs);
      opacity: 0.7;
    }

    .stage-desc {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .hub-mini-score {
      display: inline-flex;
      flex-direction: column;
      gap: 2px;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .hub-mini-score strong {
      font-size: var(--text-lg);
      line-height: 1;
      color: var(--color-text-heading);
    }

    .hub-action-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .hub-action-card {
      display: block;
      padding: var(--space-5);
      border-radius: var(--radius-xl);
      border: 1px solid color-mix(in srgb, var(--color-border) 88%, white);
      background: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.04);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .hub-action-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(16, 24, 40, 0.08);
      border-color: color-mix(in srgb, var(--color-brand) 30%, var(--color-border));
    }

    .hub-action-icon {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-lg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in srgb, var(--color-primary-100) 74%, white);
      font-size: var(--text-xl);
      margin-bottom: var(--space-3);
    }

    .hub-action-title {
      display: block;
      font-size: var(--text-base);
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      margin-bottom: var(--space-1);
    }

    .hub-action-copy {
      display: block;
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      color: var(--color-text-secondary);
    }

    /* Score ring */
    .score-ring {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-bg { fill: none; stroke: var(--color-gray-200); stroke-width: 6; }
    .score-ring-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.8s var(--ease-out); }
    .score-ring-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .score-ring-value { font-size: var(--text-xl); font-weight: var(--font-bold); color: var(--color-text-heading); line-height: var(--leading-none); }
    .score-ring-caption { font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: var(--tracking-wider); }

    /* =========================================================================
       Journey card with levels
       ========================================================================= */
    .journey-card {
      background: var(--color-bg-card);
      border: var(--border-1) solid var(--color-border);
      border-radius: var(--card-radius);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
    }

    .journey-card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--space-5);
    }

    .journey-card-title {
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
    }

    .next-level-hint {
      font-size: var(--text-sm);
      color: var(--color-brand);
    }

    /* Level stepper */
    .level-stepper {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: var(--space-6);
      overflow-x: auto;
      padding-bottom: var(--space-2);
      -webkit-overflow-scrolling: touch;
    }

    .level-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 72px;
      position: relative;
    }

    .level-step-dot {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      border: var(--border-2) solid var(--color-gray-300);
      background: var(--color-bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
      color: var(--color-text-muted);
      transition: var(--transition-all);
    }

    .level-step--completed .level-step-dot {
      background: var(--color-brand);
      border-color: var(--color-brand);
      color: white;
    }

    .level-step--current .level-step-dot {
      background: var(--color-brand);
      border-color: var(--color-brand);
      color: white;
      box-shadow: 0 0 0 4px var(--color-primary-100);
    }

    .level-step-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-2);
      text-align: center;
      text-transform: capitalize;
    }

    .level-step--completed .level-step-label,
    .level-step--current .level-step-label {
      color: var(--color-text-heading);
      font-weight: var(--font-medium);
    }

    .level-step-threshold {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-1);
    }

    .level-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 16px;
      left: calc(50% + 16px);
      right: calc(-50% + 16px);
      height: 2px;
      background: var(--color-gray-200);
      z-index: 0;
    }

    .level-step--completed:not(:last-child)::after { background: var(--color-brand); }

    /* Tier progress bar */
    .tier-progress-bar {
      height: 6px;
      background: var(--color-gray-200);
      border-radius: var(--radius-full);
      margin-bottom: var(--space-1);
      overflow: hidden;
    }

    .tier-progress-fill {
      height: 100%;
      background: var(--color-brand);
      border-radius: var(--radius-full);
      transition: width 0.4s ease;
    }

    .tier-progress-label {
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
      margin-bottom: var(--space-4);
    }

    .tier-org-context {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-4);
      padding: var(--space-2) var(--space-3);
      background: var(--color-primary-50);
      background: color-mix(in srgb, var(--color-primary-100) 40%, white);
      border-radius: var(--radius-md);
      display: inline-block;
    }

    /* What changed (returning user) */
    .what-changed {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--card-radius);
      padding: var(--space-4) var(--space-5);
      margin-bottom: var(--space-5);
    }

    .what-changed-title {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      margin-bottom: var(--space-3);
    }

    .what-changed-items {
      display: flex;
      gap: var(--space-4);
      flex-wrap: wrap;
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .what-changed-item {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    /* Milestone celebration */
    .milestone-banner {
      background: linear-gradient(135deg, var(--color-success-50) 0%, color-mix(in srgb, var(--color-primary-100) 60%, white) 100%);
      background: linear-gradient(135deg, var(--color-success-50) 0%, var(--color-primary-50) 100%);
      border: 1px solid var(--color-success-200);
      border-radius: calc(var(--card-radius) + 2px);
      padding: var(--space-5) var(--space-6);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }

    .milestone-icon {
      font-size: var(--text-3xl);
      flex-shrink: 0;
    }

    .milestone-body { flex: 1; }

    .milestone-title {
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
      margin-bottom: var(--space-1);
    }

    .milestone-detail {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-3);
    }

    .milestone-actions {
      display: flex;
      gap: var(--space-2);
    }

    /* Social proof */
    .social-proof {
      display: flex;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-4);
      background: var(--color-bg-subtle);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      flex-wrap: wrap;
    }

    .social-proof-item {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      color: var(--color-text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .social-proof-item:hover {
      color: var(--color-brand);
    }

    .social-proof-num {
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
    }

    /* Achievements grid */
    .achievements-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .achievement {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg);
      transition: var(--transition-all);
    }

    .achievement--earned {
      background: var(--color-success-50);
      border: var(--border-1) solid var(--color-success-200);
    }

    .achievement--locked {
      background: var(--color-bg-subtle);
      border: var(--border-1) dashed var(--color-border);
    }

    .achievement-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-lg);
      flex-shrink: 0;
    }

    .achievement--earned .achievement-icon {
      background: var(--color-success-100);
    }

    .achievement--locked .achievement-icon {
      background: var(--color-gray-100);
      filter: grayscale(1);
      opacity: 0.5;
    }

    .achievement-body { flex: 1; min-width: 0; }

    .achievement-name {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      margin-bottom: 2px;
    }

    .achievement--locked .achievement-name { color: var(--color-text-secondary); }

    .achievement-desc {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .achievement-unlocks {
      font-size: var(--text-xs);
      color: var(--color-brand);
      font-weight: 500;
      margin-top: 2px;
    }

    .achievement-action {
      font-size: var(--text-xs);
      color: var(--color-brand);
      text-decoration: none;
      font-weight: var(--font-medium);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .achievement-action:hover { text-decoration: underline; }

    .achievement-pts {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Ways to earn points */
    .ways-to-earn {
      margin-top: var(--space-4);
    }

    .ways-to-earn-toggle {
      font-size: var(--text-sm);
      color: var(--color-brand);
      cursor: pointer;
      font-weight: var(--font-medium);
      list-style: none;
    }

    .ways-to-earn-toggle::-webkit-details-marker { display: none; }

    .ways-to-earn-toggle::before {
      content: '▸ ';
    }

    details[open] > .ways-to-earn-toggle::before {
      content: '▾ ';
    }

    .ways-to-earn-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-1) var(--space-4);
      margin-top: var(--space-3);
      padding: var(--space-3);
      background: var(--color-bg-subtle);
      border-radius: var(--radius-md);
    }

    .ways-to-earn-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      padding: var(--space-1) 0;
    }

    .ways-to-earn-pts {
      font-weight: var(--font-medium);
      color: var(--color-brand);
      font-size: var(--text-xs);
    }

    /* =========================================================================
       Grid
       ========================================================================= */
    .hub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-6);
      margin-bottom: var(--space-6);
    }

    .hub-grid--single {
      grid-template-columns: 1fr;
    }

    /* =========================================================================
       Cards
       ========================================================================= */
    .hub-card {
      background: var(--color-bg-card);
      border: var(--border-1) solid var(--color-border);
      border-radius: var(--card-radius);
      padding: var(--space-6);
    }

    .hub-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-5);
    }

    .hub-card-title {
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
    }

    .hub-card-link {
      font-size: var(--text-sm);
      color: var(--color-brand);
      text-decoration: none;
      font-weight: var(--font-medium);
    }

    .hub-card-link:hover { text-decoration: underline; }

    /* =========================================================================
       Persona
       ========================================================================= */
    .persona-display { text-align: center; padding: var(--space-4) 0; }

    .persona-icon {
      width: 56px; height: 56px;
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-2xl);
      margin: 0 auto var(--space-4);
    }

    .academy-stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .academy-stat {
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      background: var(--color-bg-subtle);
    }

    .academy-stat:nth-child(1) { background: var(--color-primary-50); }
    .academy-stat:nth-child(2) { background: var(--color-warning-50); }
    .academy-stat:nth-child(3) { background: var(--color-success-50); }

    .academy-stat-value {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
      line-height: var(--leading-tight);
      margin-bottom: var(--space-1);
    }

    .academy-stat-label {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }

    .academy-progress {
      margin-bottom: var(--space-4);
    }

    .academy-progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-2);
    }

    .academy-progress-bar {
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--color-gray-200);
      overflow: hidden;
    }

    .academy-progress-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: linear-gradient(90deg, var(--color-brand), var(--color-success-500));
    }

    .academy-credentials {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .academy-credential {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      background: var(--color-success-100);
      color: var(--color-success-700);
    }

    .academy-copy {
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-4);
    }

    /* =========================================================================
       Group recommendations
       ========================================================================= */
    .group-rec-count { font-size: var(--text-sm); color: var(--color-text-secondary); margin-bottom: var(--space-4); }

    .group-rec-item {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: var(--border-1) solid var(--color-border);
    }
    .group-rec-item:last-child { border-bottom: none; }

    .group-rec-info { flex: 1; min-width: 0; }
    .group-rec-name { font-size: var(--text-sm); font-weight: var(--font-semibold); color: var(--color-text-heading); margin-bottom: var(--space-0_5); }
    .group-rec-reason { font-size: var(--text-xs); color: var(--color-text-muted); }

    .group-rec-badge {
      display: inline-flex;
      padding: var(--space-0_5) var(--space-2);
      border-radius: var(--badge-radius);
      font-size: 10px; font-weight: var(--font-semibold);
      text-transform: uppercase; letter-spacing: var(--tracking-wide);
      background: var(--color-gray-100); color: var(--color-gray-600);
      flex-shrink: 0;
    }

    .group-rec-link { font-size: var(--text-xs); color: var(--color-brand); text-decoration: none; font-weight: var(--font-medium); white-space: nowrap; flex-shrink: 0; }
    .group-rec-link:hover { text-decoration: underline; }

    /* =========================================================================
       Public profile card
       ========================================================================= */
    .profile-card-body { display: flex; flex-direction: column; gap: var(--space-4); }

    .profile-completeness { margin-bottom: var(--space-2); }

    .profile-completeness-label {
      display: flex; justify-content: space-between;
      font-size: var(--text-xs); color: var(--color-text-secondary);
      margin-bottom: var(--space-2);
    }

    .profile-completeness-bar {
      height: 6px;
      border-radius: var(--radius-full);
      background: var(--color-gray-200);
      overflow: hidden;
    }

    .profile-completeness-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--color-brand);
      transition: width 0.6s var(--ease-out);
    }

    .profile-completeness-fill--full { background: var(--color-success-500); }

    .profile-field {
      display: flex; gap: var(--space-3); align-items: flex-start;
    }

    .profile-field-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      min-width: 64px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .profile-field-value {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-field-value--empty { color: var(--color-text-muted); font-style: italic; }

    .profile-avatar-preview {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-full);
      overflow: hidden;
      background: var(--color-gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--color-text-muted);
    }

    .profile-avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-offerings {
      display: flex; flex-wrap: wrap; gap: var(--space-1);
    }

    .profile-offering-tag {
      display: inline-flex;
      padding: 2px var(--space-2);
      border-radius: var(--badge-radius);
      font-size: 11px;
      background: var(--color-primary-100);
      color: var(--color-primary-700);
    }

    .profile-socials {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .profile-social-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-full);
      background: var(--color-bg-subtle);
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: var(--text-xs);
      font-weight: var(--font-medium);
    }

    .profile-social-link:hover {
      color: var(--color-brand);
      text-decoration: none;
    }

    /* =========================================================================
       Activity
       ========================================================================= */
    .activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }

    .activity-metric {
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      background: var(--color-bg-subtle);
    }

    .activity-metric:nth-child(1) { background: var(--color-primary-50); }
    .activity-metric:nth-child(2) { background: var(--color-success-50); }
    .activity-metric:nth-child(3) { background: var(--color-warning-50); }
    .activity-metric:nth-child(4) { background: var(--color-info-50); }

    .activity-value { font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-text-heading); line-height: var(--leading-tight); margin-bottom: var(--space-1); }
    .activity-label { font-size: var(--text-xs); color: var(--color-text-secondary); }

    /* =========================================================================
       Timeline
       ========================================================================= */
    .timeline { position: relative; padding-left: var(--space-6); }
    .timeline::before { content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px; width: 2px; background: var(--color-gray-200); }

    .timeline-entry { position: relative; padding-bottom: var(--space-5); }
    .timeline-entry:last-child { padding-bottom: 0; }

    .timeline-dot {
      position: absolute;
      left: calc(-1 * var(--space-6) + 4px); top: 2px;
      width: 10px; height: 10px;
      border-radius: var(--radius-full);
      background: var(--color-brand);
      border: var(--border-2) solid var(--color-bg-card);
    }

    .timeline-date { font-size: var(--text-xs); color: var(--color-text-muted); margin-bottom: var(--space-1); }
    .timeline-transition { font-size: var(--text-sm); color: var(--color-text-heading); font-weight: var(--font-medium); margin-bottom: var(--space-0_5); }
    .timeline-trigger { font-size: var(--text-xs); color: var(--color-text-secondary); }
    .timeline-empty { font-size: var(--text-sm); color: var(--color-text-muted); text-align: center; padding: var(--space-6) 0; }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px var(--space-2);
      border-radius: var(--badge-radius);
      font-size: 10px; font-weight: var(--font-semibold);
      text-transform: capitalize; letter-spacing: var(--tracking-wide);
      background: var(--color-primary-100); color: var(--color-brand);
    }

    /* =========================================================================
       Publishing
       ========================================================================= */
    .content-studio-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .content-studio-stat {
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      background: var(--color-bg-subtle);
    }

    .content-studio-stat:nth-child(1) { background: var(--color-gray-100); }
    .content-studio-stat:nth-child(2) { background: var(--color-warning-50); }
    .content-studio-stat:nth-child(3) { background: var(--color-success-50); }

    .content-studio-stat-value {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
      line-height: var(--leading-tight);
      margin-bottom: var(--space-1);
    }

    .content-studio-stat-label {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }

    .content-playbook {
      display: grid;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .content-playbook-step {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--space-3);
      align-items: start;
      padding: var(--space-3) 0;
      border-bottom: var(--border-1) solid var(--color-border);
    }

    .content-playbook-step:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .content-step-num {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background: var(--color-primary-100);
      color: var(--color-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
      flex-shrink: 0;
    }

    .content-step-title {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      margin-bottom: var(--space-1);
    }

    .content-step-copy {
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      color: var(--color-text-secondary);
    }

    .content-studio-list {
      display: grid;
      gap: var(--space-3);
    }

    .content-studio-item {
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      border: var(--border-1) solid var(--color-border);
      background: var(--color-bg-subtle);
    }

    .content-studio-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }

    .content-title { font-weight: var(--font-medium); color: var(--color-text-heading); }

    .content-studio-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
    }

    .content-studio-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }

    .content-action-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      background: var(--color-bg-card);
      border: var(--border-1) solid var(--color-border);
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: var(--text-xs);
      font-weight: var(--font-medium);
    }

    .content-action-link:hover {
      color: var(--color-brand);
      text-decoration: none;
      border-color: color-mix(in srgb, var(--color-brand) 30%, var(--color-border));
    }

    .member-feed-intro {
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-4);
    }

    .member-feed-list {
      display: grid;
      gap: var(--space-3);
    }

    .member-feed-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: var(--space-3);
      align-items: start;
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      border: var(--border-1) solid var(--color-border);
      background: var(--color-bg-subtle);
    }

    .member-feed-avatar {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-full);
      overflow: hidden;
      background: var(--color-primary-100);
      color: var(--color-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      flex-shrink: 0;
    }

    .member-feed-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .member-feed-title {
      display: inline-block;
      font-size: var(--text-base);
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      text-decoration: none;
      margin-bottom: var(--space-1);
    }

    .member-feed-title:hover {
      color: var(--color-brand);
      text-decoration: none;
    }

    .member-feed-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
    }

    .member-feed-author {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      color: var(--color-text-secondary);
      text-decoration: none;
      font-weight: var(--font-medium);
    }

    .member-feed-author:hover {
      color: var(--color-brand);
      text-decoration: none;
    }

    .member-feed-headline {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-2);
    }

    .member-feed-excerpt {
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      color: var(--color-text-secondary);
    }

    .member-feed-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      justify-content: flex-end;
    }

    .status-badge {
      display: inline-flex;
      padding: var(--space-0_5) var(--space-2);
      border-radius: var(--badge-radius);
      font-size: 10px; font-weight: var(--font-semibold);
      text-transform: uppercase; letter-spacing: var(--tracking-wide);
    }
    .status-badge--published { background: var(--color-success-100); color: var(--color-success-700); }
    .status-badge--pending_review { background: var(--color-warning-100); color: var(--color-warning-700); }
    .status-badge--draft { background: var(--color-gray-100); color: var(--color-gray-600); }

    /* =========================================================================
       Loading / empty
       ========================================================================= */
    .hub-loading {
      text-align: center; padding: var(--space-16); color: var(--color-text-muted);
    }
    .hub-loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--color-border); border-top-color: var(--color-brand);
      border-radius: var(--radius-full);
      animation: spin 1s linear infinite;
      margin: 0 auto var(--space-4);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hub-empty { text-align: center; padding: var(--space-6); color: var(--color-text-muted); font-size: var(--text-sm); }
    .hub-empty a { color: var(--color-brand); text-decoration: none; font-weight: var(--font-medium); }
    .hub-empty a:hover { text-decoration: underline; }

    .hub-empty-panel {
      max-width: 760px;
      margin: 0 auto;
      background: rgba(255,255,255,0.92);
      border: 1px solid color-mix(in srgb, var(--color-border) 88%, white);
      border-radius: calc(var(--card-radius) + 4px);
      box-shadow: 0 16px 40px rgba(16, 24, 40, 0.06);
      padding: var(--space-8);
      text-align: left;
    }

    .hub-empty-panel h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: var(--leading-tight);
      color: var(--color-text-heading);
      margin-bottom: var(--space-3);
    }

    .hub-empty-panel p {
      font-size: var(--text-lg);
      line-height: var(--leading-relaxed);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-5);
    }

    .hub-empty-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
    }

    /* =========================================================================
       Responsive
       ========================================================================= */
    @media (max-width: 768px) {
      .hub-header { grid-template-columns: 1fr; }
      .hub-hero-card,
      .hub-focus-card { padding: var(--space-6); }
      .hub-grid { grid-template-columns: 1fr; }
      .score-ring { align-self: flex-start; }
      .achievements-grid { grid-template-columns: 1fr; }
      .hub-action-grid { grid-template-columns: 1fr 1fr; }
      .activity-grid { grid-template-columns: 1fr 1fr; }

      .academy-stat-grid,
      .content-studio-stats { grid-template-columns: 1fr; }
      .member-feed-item { grid-template-columns: 1fr; }
      .member-feed-actions { justify-content: flex-start; }
    }

    @media (max-width: 520px) {
      .hub-action-grid { grid-template-columns: 1fr; }
      .hub-focus-footer { flex-direction: column; align-items: flex-start; }
      .hub-empty-panel { padding: var(--space-6); }
    }
  </style>
</head>
<body>
  <div id="adcp-nav"></div>
  <script src="/nav.js"></script>

  <div class="hub-container">
    <div id="hub-loading" class="hub-loading">
      <div class="spinner"></div>
      <p>Loading your member hub...</p>
    </div>

    <div id="hub-content" style="display: none;"></div>
  </div>

  <div id="adcp-footer"></div>

  <script>
    const config = window.__APP_CONFIG__ || {};
    if (!config.user) {
      window.location.href = '/auth/login?return_to=/member-hub';
    }

    document.addEventListener('DOMContentLoaded', loadHub);

    async function loadHub() {
      try {
        const [engRes, meRes, communityRes, certRes, tracksRes, contentRes, perspectivesRes, journeyRes] = await Promise.all([
          fetch('/api/me/engagement'),
          fetch('/api/me', { credentials: 'include' }),
          fetch('/api/me/community/hub', { credentials: 'include' }),
          fetch('/api/me/certification/progress', { credentials: 'include' }),
          fetch('/api/certification/tracks'),
          fetch('/api/me/content?limit=6', { credentials: 'include' }),
          fetch('/api/perspectives?authored=true&limit=6', { credentials: 'include' }),
          fetch('/api/me/journey', { credentials: 'include' }),
        ]);

        if (!engRes.ok) {
          if (engRes.status === 401) {
            window.location.href = '/auth/login?return_to=/member-hub';
            return;
          }
          if (engRes.status === 404) {
            document.getElementById('hub-loading').innerHTML =
              '<div class="hub-empty-panel">' +
              '<div class="hub-kicker">My hub</div>' +
              '<h1>Your member hub will light up once you join a workspace</h1>' +
              '<p>You can still explore membership plans, browse the community, and decide how you want to participate before joining.</p>' +
              '<div class="hub-empty-actions">' +
              '<a href="/membership" class="btn btn-primary">Explore membership</a>' +
              '<a href="/community" class="btn btn-secondary">Browse community</a>' +
              '</div>' +
              '</div>';
            return;
          }
          throw new Error('Failed to load engagement data');
        }
        const data = await engRes.json();
        const meData = meRes.ok ? await meRes.json() : null;
        const communityData = communityRes.ok ? await communityRes.json() : null;
        const certData = certRes.ok ? await certRes.json() : null;
        const tracksData = tracksRes.ok ? await tracksRes.json() : null;
        const contentData = contentRes.ok ? await contentRes.json() : null;
        const perspectivesData = perspectivesRes.ok ? await perspectivesRes.json() : null;
        const journeyData = journeyRes.ok ? await journeyRes.json() : null;

        renderHub({
          engagement: data,
          me: meData,
          community: communityData,
          certification: certData,
          tracks: tracksData,
          contentItems: contentData?.items || [],
          latestPerspectives: Array.isArray(perspectivesData) ? perspectivesData : [],
          journey: journeyData,
        });
      } catch (err) {
        console.error('Hub load error:', err);
        document.getElementById('hub-loading').innerHTML =
          '<p>Failed to load member hub. <a href="/member-hub">Try again</a></p>';
      }
    }

    // =========================================================================
    // Constants
    // =========================================================================

    // Tier progression (individual, point-based)
    const TIERS = ['explorer', 'connector', 'champion', 'pioneer'];

    const TIER_LABELS = {
      explorer:  'Explorer',
      connector: 'Connector',
      champion:  'Champion',
      pioneer:   'Pioneer',
    };

    const TIER_DESCS = {
      explorer:  'Getting started in the community',
      connector: 'Building connections and learning',
      champion:  'Active contributor and collaborator',
      pioneer:   'Leading and shaping the community',
    };

    const TIER_THRESHOLDS = { explorer: 0, connector: 50, champion: 200, pioneer: 500 };

    const TRIGGER_LABELS = {
      milestone_achieved:   'Milestone achieved',
      milestone_lost:       'Milestone lost',
      admin_override:       'Updated by admin',
      recomputation:        'Periodic review',
      initial:              'Initial assessment',
      membership_change:    'Group membership changed',
      leadership_change:    'Leadership role changed',
      content_contribution: 'Content contribution',
    };

    // =========================================================================
    // Render
    // =========================================================================

    function renderHub(payload) {
      const {
        engagement: data,
        me,
        community,
        certification,
        tracks,
        contentItems,
        latestPerspectives,
        journey,
      } = payload;
      const {
        organization_name,
        milestones, recommended_groups, current_group_count,
        activity, journey_history,
      } = data;
      const profile = community?.profile || null;
      const profileCompleteness = community?.profile_completeness || 0;
      const seatType = me?.user?.seat_type || null;
      const firstName = config?.user?.firstName || 'there';

      document.getElementById('hub-loading').style.display = 'none';
      const el = document.getElementById('hub-content');
      el.style.display = 'block';

      // Personal tier from journey API (falls back to engagement score)
      const tier      = journey?.tier?.tier || 'explorer';
      const points    = journey?.tier?.points || data.community_points || 0;
      const tierIdx   = TIERS.indexOf(tier);
      const tierLabel = TIER_LABELS[tier] || 'Explorer';
      const tierDesc  = TIER_DESCS[tier] || '';
      const nextTier  = journey?.tier?.next_tier || null;
      const nextAt    = journey?.tier?.next_tier_at || null;
      const progressPct = journey?.tier?.progress_pct || 0;

      // Org context for social proof
      const orgCtx = journey?.org_context || null;

      const primaryAction = getPrimaryAction({ profile, milestones, contentItems, currentGroupCount: current_group_count, stage: tier, score: points, activity, certification, seatType });

      el.innerHTML = `
        <!-- Header -->
        <div class="hub-header">
          <div class="hub-hero-card">
            <div class="hub-kicker">My hub</div>
            <h1>Welcome back, ${escapeHtml(firstName)}.</h1>
            <p class="hub-lede">This is your home base for membership progress, profile momentum, and the next things worth doing inside AgenticAdvertising.org.</p>
            <div class="hub-header-meta">
              <span class="hub-meta-pill">🏢 ${escapeHtml(organization_name || 'Member workspace')}</span>
              <span class="level-badge">
                ${escapeHtml(tierLabel)}
              </span>
              <span class="stage-desc">${escapeHtml(tierDesc)}</span>
              <span class="hub-meta-pill">⚡ ${points} points</span>
            </div>
            <div class="hub-hero-actions">
              <a href="${primaryAction.href}" class="btn btn-primary">${escapeHtml(primaryAction.label)}</a>
              <a href="/account" class="btn btn-secondary">Edit profile</a>
              <a href="/organization" class="btn btn-secondary">View organization</a>
            </div>
          </div>
          <aside class="hub-focus-card">
            <div>
              <div class="hub-focus-label">Recommended next step</div>
              <div class="hub-focus-title">${escapeHtml(primaryAction.label)}</div>
              <div class="hub-focus-copy">${escapeHtml(primaryAction.description)}</div>
            </div>
            <div class="hub-focus-footer">
              <a href="${primaryAction.href}" class="btn btn-primary btn-sm">Do this now</a>
              <div class="hub-mini-score" title="${points} community points — ${tierLabel}">
                <strong>${points}</strong>
                <span>points</span>
              </div>
            </div>
          </aside>
        </div>

        ${renderMilestoneBanner(journey?.recent_milestone)}
        ${renderWhatChanged(journey?.what_changed)}

        <div class="hub-action-grid">
          ${renderQuickActions(current_group_count, contentItems, seatType)}
        </div>

        <!-- Tier progress + social proof -->
        ${renderSocialProof(journey?.community_stats)}
        ${renderTierProgress(tier, tierIdx, points, nextTier, nextAt, progressPct, orgCtx, milestones)}

        <!-- Grid row 1: Academy + Groups -->
        <div class="hub-grid">
          <div class="hub-card">${renderAcademy(certification, tracks)}</div>
          <div class="hub-card">${renderGroups(recommended_groups, current_group_count, seatType)}</div>
        </div>

        <!-- Grid row 2: Profile + Content -->
        <div class="hub-grid">
          <div class="hub-card">${renderProfileCard(profile, profileCompleteness)}</div>
          <div class="hub-card">${renderContentStudio(contentItems)}</div>
        </div>

        <div class="hub-grid hub-grid--single">
          <div class="hub-card">${renderLatestMembers(latestPerspectives, profile?.slug || null)}</div>
        </div>

        <!-- Grid row 3: Activity + Timeline -->
        <div class="hub-grid">
          <div class="hub-card">${renderActivity(activity)}</div>
          <div class="hub-card">${renderTimeline(journey_history)}</div>
        </div>
      `;
    }

    // -------------------------------------------------------------------------

    function getPrimaryAction({ profile, milestones, contentItems, currentGroupCount, stage, score, certification, seatType }) {
      if (!profile?.headline || !profile?.bio) {
        return {
          label: 'Complete your public profile',
          href: '/account',
          description: 'Tighten up your public profile so other members can understand your expertise, discover you, and know when to reach out.',
        };
      }

      const earlyTier = stage === 'explorer';
      const completedModules = (certification?.progress || []).filter(function (p) { return p.status === 'completed'; }).length;
      if (earlyTier || score < 100 || completedModules === 0) {
        return {
          label: 'Start Academy',
          href: '/certification',
          description: 'Use Academy to get oriented quickly, understand the protocol, and build enough context to participate confidently.',
        };
      }

      if (seatType !== 'community_only' && (!milestones?.has_working_groups || !currentGroupCount)) {
        return {
          label: 'Join a working group',
          href: '/committees?type=working_group',
          description: 'Working groups are where the real work happens. Join one to move from being a member to being an active participant.',
        };
      }

      const drafts = Array.isArray(contentItems) ? contentItems.filter(function (item) { return item.status === 'draft'; }) : [];
      const published = Array.isArray(contentItems) ? contentItems.filter(function (item) { return item.status === 'published'; }) : [];

      if (drafts.length > 0) {
        return {
          label: 'Finish your draft',
          href: '/my-content',
          description: 'You already have content in motion. Tighten the draft, submit it, and then use it to start conversations publicly.',
        };
      }

      if (!contentItems || contentItems.length === 0) {
        return {
          label: 'Share what you are building',
          href: '/my-content',
          description: 'Publishing a perspective, article, or link is one of the fastest ways to contribute and build visibility in the community.',
        };
      }

      if (published.length > 0) {
        return {
          label: 'Promote your latest post',
          href: '/my-content',
          description: 'Turn your published perspective into visibility with a short LinkedIn post, a sharper point of view, and a link back to the article.',
        };
      }

      if (seatType === 'community_only') {
        return {
          label: 'Keep building your profile',
          href: '/account',
          description: 'With community access, the highest-leverage moves are learning, publishing, and making yourself easier for other members to discover.',
        };
      }

      if (!milestones?.has_recruiting_activity) {
        return {
          label: 'Introduce a colleague',
          href: '/community/people',
          description: 'The strongest communities grow through warm invitations. Bring one smart person into the conversation and keep the momentum going.',
        };
      }

      return {
        label: 'Review your organization workspace',
        href: '/organization',
        description: 'You have the basics in place. Use the organization workspace to manage team participation, listings, and operational details.',
      };
    }

      const actions = [
        {
          href: '/account',
          icon: '👤',
          title: 'Profile',
          copy: 'Sharpen your public identity and how other members discover you.',
        },
        {
          href: '/certification',
          icon: '🎓',
          title: 'Academy',
          copy: 'Build protocol fluency, get oriented fast, and keep sharpening your skills.',
        },
        {
          href: seatType === 'community_only' ? '/organization#membership' : '/committees?type=working_group',
          icon: '👥',

          copy: seatType === 'community_only'

    function renderSocialProof(stats) {
      if (!stats) return '';
      const items = [];
      if (stats.credentials_earned_30d > 0) {
        items.push(`<a href="/certification" class="social-proof-item"><span class="social-proof-num">${stats.credentials_earned_30d}</span> people earned credentials this month</a>`);

    function renderTierProgress(tier, tierIdx, points, nextTier, nextAt, progressPct, orgCtx, milestones) {
      // Show all tiers so users can see the full progression
      const steps = TIERS.map((t, tIdx) => {
        const isCurrent = t === tier;
        const isCompleted = tIdx < tierIdx;
        let cls = 'level-step';
        if (isCurrent) cls += ' level-step--current';
        else if (isCompleted) cls += ' level-step--completed';
        const icon = isCompleted ? '✓' : TIER_LABELS[t].charAt(0);
        const threshold = TIER_THRESHOLDS[t];
        const thresholdLabel = threshold > 0 ? `${threshold} pts` : '';
        return `
          <div class="${cls}" title="${escapeHtml(TIER_DESCS[t])}">
            <div class="level-step-dot">${icon}</div>
            <span class="level-step-label">${escapeHtml(TIER_LABELS[t])}</span>
            ${thresholdLabel ? `<span class="level-step-threshold">${thresholdLabel}</span>` : ''}
          </div>`;
      }).join('');

      const nextHint = nextTier && nextAt
        ? `${nextAt - points} more points to ${TIER_LABELS[nextTier]}`
        : tier === 'pioneer' ? 'You\'ve reached the highest tier' : '';

      // Org context line ("You're one of N certified at Company")
      const orgLine = orgCtx && orgCtx.certified_count > 0
        ? `<div class="tier-org-context">You're one of ${orgCtx.certified_count} certified ${orgCtx.certified_count === 1 ? 'person' : 'people'} at ${escapeHtml(orgCtx.org_name)}</div>`
        : '';

      // Progress bar toward next tier
      const progressBar = nextTier ? `
        <div class="tier-progress-bar" role="progressbar" aria-valuenow="${points}" aria-valuemin="0" aria-valuemax="${nextAt}" aria-label="Progress to ${TIER_LABELS[nextTier]}">
          <div class="tier-progress-fill" style="width: ${progressPct}%"></div>
        </div>
        <div class="tier-progress-label">${points} / ${nextAt} points</div>
      ` : '';

      const ms = milestones || {};
      const achievements = [
        { key: 'has_working_groups',      icon: '👥', label: 'Working group member',    desc: 'Joined at least one working group',      href: '/committees?type=working_group', action: 'Browse groups',          pts: 10 },
        { key: 'has_content_proposals',   icon: '✍',  label: 'Content contributor',     desc: 'Proposed or published content',           href: '/my-content',                   action: 'Propose content',        pts: 50 },
        { key: 'has_leadership',          icon: '⭐',  label: 'Group leader',            desc: 'Chair or vice-chair of a working group', href: '/committees?type=working_group', action: 'View openings',          pts: 30 },
        { key: 'has_recruiting_activity', icon: '📣',  label: 'Community advocate',      desc: 'Introduced a colleague',                 href: '/community/people',             action: 'Introduce a colleague',  pts: 10 },
      ];

      const achHtml = achievements.map(a => {
        const earned = !!ms[a.key];
        return `
          <div class="achievement achievement--${earned ? 'earned' : 'locked'}">
            <div class="achievement-icon">${a.icon}</div>
            <div class="achievement-body">
              <div class="achievement-name">${a.label}</div>
              <div class="achievement-desc">${a.desc}</div>
            </div>
            ${!earned
              ? `<a href="${a.href}" class="achievement-action">${a.action} →</a>`
              : `<span class="achievement-pts">+${a.pts} pts</span>`}
          </div>`;
      }).join('');

      const waysList = [
        { action: 'Publish a perspective',    pts: 50 },
        { action: 'Attend an event',          pts: 25 },
        { action: 'Join a working group',     pts: 10 },
        { action: 'Make a connection',        pts: 10 },
        { action: 'Link your GitHub',         pts: 10 },
        { action: 'RSVP to a meeting',        pts: 5 },
        { action: 'Register for an event',    pts: 5 },
        { action: 'Daily visit',              pts: 2 },
      ];
      const waysHtml = `
        <details class="ways-to-earn">
          <summary class="ways-to-earn-toggle">How to earn points</summary>
          <div class="ways-to-earn-list">
            ${waysList.map(w => `
              <div class="ways-to-earn-item">
                <span>${w.action}</span>
                <span class="ways-to-earn-pts">+${w.pts}</span>
              </div>
            `).join('')}
          </div>
        </details>`;

      return `
        <div class="journey-card">
          <div class="journey-card-header">
            <span class="journey-card-title">Your progress</span>
            ${nextHint ? `<span class="next-level-hint">${escapeHtml(nextHint)}</span>` : ''}
          </div>
          <div class="level-stepper">${steps}</div>
          ${progressBar}
          ${orgLine}
          <div class="achievements-grid">${achHtml}</div>
          ${waysHtml}
        </div>`;
    }

    // -------------------------------------------------------------------------

    function renderAcademy(certification, tracks) {
      const hdr = `
        <div class="hub-card-header">
          <span class="hub-card-title">Academy progress</span>
          <a href="/certification" class="hub-card-link">Open Academy →</a>
        </div>`;

      const progress = certification?.progress || [];
      const credentials = certification?.credentials || certification?.certifications || [];
      const totalModules = Array.isArray(tracks?.tracks)
        ? tracks.tracks.reduce(function (sum, track) { return sum + ((track.modules || []).length); }, 0)
        : 0;
      const completedModules = progress.filter(function (item) { return item.status === 'completed'; }).length;
      const inProgressModules = progress.filter(function (item) { return item.status === 'in_progress'; }).length;
      const completionPct = totalModules > 0 ? Math.round((completedModules / totalModules) * 100) : 0;

      if (completedModules === 0 && inProgressModules === 0 && credentials.length === 0) {
        return `${hdr}
          <p class="academy-copy">Academy is the fastest way to get fluent in AdCP, earn credentials, and build enough context to contribute with confidence.</p>
          <div class="content-playbook">
            <div class="content-playbook-step">
              <div class="content-step-num">1</div>
              <div>
                <div class="content-step-title">Start with the free lesson</div>
                <div class="content-step-copy">Use Addie to get oriented and establish a baseline before you jump into deeper working group work.</div>
              </div>
            </div>
            <div class="content-playbook-step">
              <div class="content-step-num">2</div>
              <div>
                <div class="content-step-title">Earn your first credential</div>
                <div class="content-step-copy">Credentials make your fluency visible and give you a stronger base for public contributions.</div>
              </div>
            </div>
          </div>
          <a href="/certification" class="btn btn-primary">Start Academy</a>`;
      }

      return `
        ${hdr}
        <div class="academy-stat-grid">
          <div class="academy-stat">
            <div class="academy-stat-value">${completedModules}</div>
            <div class="academy-stat-label">Modules completed</div>
          </div>
          <div class="academy-stat">
            <div class="academy-stat-value">${inProgressModules}</div>
            <div class="academy-stat-label">In progress</div>
          </div>
          <div class="academy-stat">
            <div class="academy-stat-value">${credentials.length}</div>
            <div class="academy-stat-label">Credentials earned</div>
          </div>
        </div>
        ${totalModules > 0 ? `
          <div class="academy-progress">
            <div class="academy-progress-label">
              <span>Curriculum progress</span>
              <span>${completedModules} of ${totalModules}</span>
            </div>
            <div class="academy-progress-bar">
              <div class="academy-progress-fill" style="width: ${completionPct}%"></div>
            </div>
          </div>
        ` : ''}
        ${credentials.length > 0 ? `
          <div class="academy-credentials">
            ${credentials.slice(0, 4).map(function (credential) {
              const label = credential.credential_name || credential.name || credential.track_name || 'Credential';
              return `<span class="academy-credential">🎓 ${escapeHtml(label)}</span>`;
            }).join('')}

        ` : ''}
        <p class="academy-copy">${inProgressModules > 0 ? 'You already have learning in motion. Keep the cadence going and turn that momentum into visible credentials.' : 'You have started building fluency. Keep moving through Academy so your public contributions rest on real protocol depth.'}</p>
        <a href="/certification" class="btn btn-secondary">${inProgressModules > 0 ? 'Continue Academy' : 'See your credentials'}</a>`;

    function renderProfileCard(profile, profileCompleteness) {

      const initials = ((config?.user?.firstName || '').charAt(0) + (config?.user?.lastName || '').charAt(0)).trim() || 'U';
      const avatarHtml = profile.avatar_url

    function renderTimeline(history) {
      const hdr = `<div class="hub-card-header"><span class="hub-card-title">Journey history</span></div>`;
      if (!history || history.length === 0) {
        return `${hdr}<div class="timeline-empty">Your journey starts here</div>`;
      }
      const entries = history.slice(0, 6).map(e => {
        const fromBadge = e.from_stage
          ? `<span class="stage-badge">${escapeHtml(e.from_stage)}</span>`
          : `<span class="stage-badge" style="background:var(--color-gray-100);color:var(--color-gray-500)">start</span>`;
        return `
          <div class="timeline-entry">
            <div class="timeline-dot"></div>
            <div class="timeline-date">${e.transitioned_at ? fmtDate(e.transitioned_at) : ''}</div>
            <div class="timeline-transition">${fromBadge} → <span class="stage-badge">${escapeHtml(e.to_stage)}</span></div>
            <div class="timeline-trigger">${escapeHtml(TRIGGER_LABELS[e.trigger_type] || e.trigger_type)}</div>
          </div>`;
      }).join('');
      return `${hdr}<div class="timeline">${entries}</div>`;
    }

    // -------------------------------------------------------------------------

    function renderContentStudio(contributions) {
      const hdr = `
        <div class="hub-card-header">
          <span class="hub-card-title">Your content</span>
          <a href="/my-content" class="hub-card-link">Manage →</a>
        </div>`;

      const items = Array.isArray(contributions) ? contributions : [];
      const drafts = items.filter(function (item) { return item.status === 'draft'; });
      const inReview = items.filter(function (item) { return item.status === 'pending_review'; });
      const published = items.filter(function (item) { return item.status === 'published'; });

      if (items.length === 0) {
        return `${hdr}
          <div class="content-playbook">
            <div class="content-playbook-step">
              <div class="content-step-num">1</div>
              <div>
                <div class="content-step-title">Create a perspective or external link</div>
                <div class="content-step-copy">Use My Content to draft a perspective, submit a link, or start a post that can go through the right review path.</div>
              </div>
            </div>
            <div class="content-playbook-step">
              <div class="content-step-num">2</div>
              <div>
                <div class="content-step-title">Publish it through the right collection</div>
                <div class="content-step-copy">Choose whether it belongs on the main site or within a committee flow so the right people review it.</div>
              </div>
            </div>
            <div class="content-playbook-step">
              <div class="content-step-num">3</div>
              <div>
                <div class="content-step-title">Turn it into visibility</div>
                <div class="content-step-copy">After publishing, turn the piece into a LinkedIn post, then use other channels if they fit your audience.</div>
              </div>
            </div>
          </div>
          <div class="content-studio-actions">
            <a href="/my-content" class="content-action-link">Start a piece</a>
            <a href="/chat?prompt=${encodeURIComponent('Help me brainstorm a perspective or article idea for AgenticAdvertising.org based on my current work.')}" class="content-action-link">Brainstorm with Addie</a>
          </div>`;
      }

      const featuredItems = items.slice(0, 3).map(function (item) {
        const articleUrl = item.slug ? (window.location.origin + '/perspectives/' + item.slug) : '/my-content';
        const linkedInShare = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(articleUrl);
        const xText = 'I just published a new perspective on AgenticAdvertising.org: ' + item.title;
        const xShare = 'https://twitter.com/intent/tweet?url=' + encodeURIComponent(articleUrl) + '&text=' + encodeURIComponent(xText);
        const addiePrompt = '/chat?prompt=' + encodeURIComponent('Help me turn my published article "' + item.title + '" into a strong LinkedIn post first, then suggest a shorter optional X version. Here is the article URL: ' + articleUrl);
        const pageviews30dValue = Number(item.performance?.pageviews_last_30d || 0);
        const pageviews30d = pageviews30dValue > 0 ? formatMetricCount(pageviews30dValue) : null;
        return `
          <div class="content-studio-item">
            <div class="content-studio-item-header">
              <div>
                <div class="content-title">${escapeHtml(item.title)}</div>
                <div class="content-studio-meta">
                  <span class="status-badge ${statusClass(item.status)}">${statusLabel(item.status)}</span>
                  <span>${escapeHtml(typeLabel(item.content_type))}</span>
                  ${item.collection?.committee_name ? `<span>${escapeHtml(item.collection.committee_name)}</span>` : ''}
                  ${item.status === 'published' && pageviews30d ? `<span>${pageviews30d} pageviews (30d)</span>` : ''}
                </div>
              </div>
            </div>
            ${item.excerpt ? `<div class="content-step-copy">${escapeHtml(item.excerpt)}</div>` : ''}
            <div class="content-studio-actions">
              <a href="/my-content" class="content-action-link">Open in publishing</a>
              ${item.status === 'published' ? `<a href="${linkedInShare}" target="_blank" rel="noopener" class="content-action-link">Share on LinkedIn</a>` : ''}
              ${item.status === 'published' ? `<a href="${addiePrompt}" class="content-action-link">Draft LinkedIn post</a>` : ''}
              ${item.status === 'published' ? `<a href="${xShare}" target="_blank" rel="noopener" class="content-action-link">Optional: X</a>` : ''}
            </div>
          </div>`;
      }).join('');

      return `
        ${hdr}
        <div class="content-studio-stats">
          <div class="content-studio-stat">
            <div class="content-studio-stat-value">${drafts.length}</div>
            <div class="content-studio-stat-label">Drafts</div>
          </div>
          <div class="content-studio-stat">
            <div class="content-studio-stat-value">${inReview.length}</div>
            <div class="content-studio-stat-label">In review</div>
          </div>
          <div class="content-studio-stat">
            <div class="content-studio-stat-value">${published.length}</div>
            <div class="content-studio-stat-label">Published</div>
          </div>
        </div>
        <div class="content-playbook">
          <div class="content-playbook-step">
            <div class="content-step-num">1</div>
            <div>
              <div class="content-step-title">${drafts.length > 0 ? 'Finish what is already in motion' : 'Start with a point of view'}</div>
              <div class="content-step-copy">${drafts.length > 0 ? 'You already have draft material. Tighten the argument, submit it, and get it into review.' : 'The fastest path to visibility is a sharp perspective on something you are learning or building right now.'}</div>
            </div>
          </div>
          <div class="content-playbook-step">
            <div class="content-step-num">2</div>
            <div>
              <div class="content-step-title">Use the right review path</div>
              <div class="content-step-copy">My Content already knows where you can publish directly and where review is required. Use that workflow instead of guessing.</div>
            </div>
          </div>
          <div class="content-playbook-step">
            <div class="content-step-num">3</div>
            <div>
              <div class="content-step-title">Promote the finished piece</div>
              <div class="content-step-copy">Once a piece is published, start with LinkedIn to pull people back into the perspective, then expand from there if it is working.</div>
            </div>
          </div>
        </div>
        <div class="content-studio-list">${featuredItems}</div>`;
    }

    function renderLatestMembers(items, currentProfileSlug) {
      const hdr = `
        <div class="hub-card-header">
          <span class="hub-card-title">Latest from members</span>
          <a href="/latest/perspectives" class="hub-card-link">See all perspectives →</a>
        </div>`;

      const feedItems = (Array.isArray(items) ? items : [])
        .filter(function (item) { return item && item.slug; })
        .slice(0, 4);

      if (feedItems.length === 0) {
        return `${hdr}
          <div class="hub-empty">
            <p>No published member perspectives yet.</p>
            <a href="/latest/perspectives">Browse the latest perspectives →</a>
          </div>`;
      }

      const intro = `<p class="member-feed-intro">See what other members are publishing, then jump from the article to the author to start a conversation or make a connection.</p>`;

      const rows = feedItems.map(function (item) {
        const articleHref = `/perspectives/${encodeURIComponent(item.slug)}`;
        const authorHref = item.author_slug
          ? `/community/people/${encodeURIComponent(item.author_slug)}`
          : '/community';
        const authorLabel = !item.author_slug
          ? 'Browse members'
          : item.author_slug === currentProfileSlug
          ? 'View your profile'
          : 'Meet the author';
        const avatarFallback = initialsFromName(item.author_name || 'AA');
        const avatar = item.author_avatar_url
          ? `<img src="${escapeHtml(item.author_avatar_url)}" alt="${escapeHtml(item.author_name || 'Author')}">`
          : escapeHtml(avatarFallback);
        const likeCount = Number(item.like_count || 0);
        const metaBits = [
          item.author_name
            ? item.author_slug
              ? `<a class="member-feed-author" href="${authorHref}">${escapeHtml(item.author_name)}</a>`
              : `<span>${escapeHtml(item.author_name)}</span>`
            : '<span>Community member</span>',
          item.published_at ? `<span>${fmtDate(item.published_at)}</span>` : '',
          likeCount > 0 ? `<span>${formatMetricCount(likeCount)} likes</span>` : '',
        ].filter(Boolean).join('');

        const avatarWrapperOpen = item.author_slug
          ? `<a href="${authorHref}" class="member-feed-avatar" aria-label="${escapeHtml(item.author_name || 'Author profile')}">`
          : '<div class="member-feed-avatar">';
        const avatarWrapperClose = item.author_slug ? '</a>' : '</div>';

        return `
          <div class="member-feed-item">
            ${avatarWrapperOpen}${avatar}${avatarWrapperClose}
            <div>
              <a href="${articleHref}" class="member-feed-title">${escapeHtml(item.title)}</a>
              <div class="member-feed-meta">${metaBits}</div>
              ${item.author_headline ? `<div class="member-feed-headline">${escapeHtml(item.author_headline)}</div>` : ''}
              ${item.excerpt ? `<div class="member-feed-excerpt">${escapeHtml(item.excerpt)}</div>` : ''}
            </div>
            <div class="member-feed-actions">
              <a href="${articleHref}" class="content-action-link">Read</a>
              <a href="${authorHref}" class="content-action-link">${authorLabel}</a>
            </div>
          </div>`;
      }).join('');

      return `${hdr}${intro}<div class="member-feed-list">${rows}</div>`;
    }

    function typeLabel(value) {
      return value === 'link' ? 'Link' : 'Article';
    }

    function statusLabel(value) {
      return value === 'published' ? 'Published' : value === 'pending_review' ? 'In review' : 'Draft';
    }

    function statusClass(value) {
      return value === 'published' ? 'status-badge--published' : value === 'pending_review' ? 'status-badge--pending_review' : 'status-badge--draft';
    }

    // =========================================================================
    // Utilities
    // =========================================================================

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function fmtDate(s) {
      try { return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
      catch { return String(s); }
    }

    function relDate(s) {
      try {
        const d = Math.floor((Date.now() - new Date(s)) / 86400000);
        if (d === 0) return 'Today';
        if (d === 1) return '1 day ago';
        if (d < 7)  return d + ' days ago';
        if (d < 30) return Math.floor(d / 7) + 'w ago';
        if (d < 365) return Math.floor(d / 30) + 'mo ago';
        return fmtDate(s);
      } catch { return String(s); }
    }

    function formatMetricCount(value) {
      const numericValue = typeof value === 'string' ? Number(value) : value;
      if (typeof numericValue !== 'number' || !Number.isFinite(numericValue)) return null;
      return new Intl.NumberFormat('en-US', {
        notation: numericValue >= 1000 ? 'compact' : 'standard'
      }).format(numericValue);
    }

    function initialsFromName(value) {
      if (!value) return 'AA';
      return value
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(function (part) { return part.charAt(0).toUpperCase(); })
        .join('') || 'AA';
    }
  </script>
</body>
