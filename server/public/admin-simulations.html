<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/addie-icon.svg" type="image/svg+xml">
  <title>Admin - Outreach simulator - AgenticAdvertising.org</title>
  <link rel="stylesheet" href="/design-system.css">
  <script src="/nav.js"></script>
  <script src="/admin-sidebar.js"></script>
  <style>
    body { background: var(--color-bg-page); min-height: 100vh; }
    .container { max-width: var(--container-xl); margin: var(--space-8) auto; padding: 0 var(--space-5); }
    .card {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      margin-bottom: var(--space-5);
      box-shadow: var(--shadow-xs);
    }
    h1 { margin-bottom: var(--space-2_5); color: var(--color-text-heading); }
    h2 { margin-bottom: var(--space-4); color: var(--color-text-heading); font-size: var(--text-xl); }
    h3 { margin-bottom: var(--space-3); color: var(--color-text-heading); font-size: var(--text-lg); }
    .subtitle { color: var(--color-text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-6); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: var(--space-1);
      margin-bottom: var(--space-6);
      border-bottom: var(--border-1) solid var(--color-gray-200);
    }
    .tab {
      padding: var(--space-3) var(--space-5);
      border: none;
      background: none;
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--color-text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab:hover { color: var(--color-text-heading); }
    .tab.active {
      color: var(--color-brand);
      border-bottom-color: var(--color-brand);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    .stat-card {
      background: var(--color-gray-50);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      text-align: center;
    }
    .stat-value { font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-brand); }
    .stat-label { font-size: var(--text-sm); color: var(--color-text-secondary); }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td {
      padding: var(--space-3);
      text-align: left;
      border-bottom: var(--border-1) solid var(--color-gray-200);
      font-size: var(--text-sm);
    }
    .data-table th {
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      background: var(--color-gray-50);
    }

    /* Buttons */
    .btn {
      padding: var(--space-2) var(--space-4);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: var(--transition-all);
    }
    .btn-primary { background: var(--color-brand); color: white; }
    .btn-primary:hover { background: var(--color-primary-600); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Simulation controls */
    .sim-controls {
      display: flex;
      gap: var(--space-4);
      align-items: center;
      margin-bottom: var(--space-6);
    }
    .sim-controls label {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }
    .sim-controls input {
      padding: var(--space-2) var(--space-3);
      border: var(--border-1) solid var(--color-gray-200);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      width: 80px;
    }

    /* Simulation result card */
    .sim-result {
      border: var(--border-1) solid var(--color-gray-200);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      margin-bottom: var(--space-4);
    }
    .sim-result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-4);
    }
    .sim-persona-name {
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      font-size: var(--text-lg);
    }
    .sim-persona-desc {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }
    .sim-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .sim-metric {
      text-align: center;
    }
    .sim-metric-value {
      font-size: var(--text-xl);
      font-weight: var(--font-bold);
    }
    .sim-metric-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    /* Timeline visualization */
    .sim-timeline {
      display: flex;
      gap: 1px;
      height: 24px;
      margin-top: var(--space-3);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .sim-day {
      flex: 1;
      min-width: 2px;
    }
    .sim-day.contacted { background: var(--color-primary-400); }
    .sim-day.skipped { background: var(--color-gray-100); }
    .sim-day.blocked { background: var(--color-error-200); }
    .sim-day.responded { background: var(--color-success-400); }
    .sim-day.empty { background: var(--color-gray-50); }

    .sim-legend {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-2);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
    .sim-legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
    .sim-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    /* Health indicators */
    .health-good { color: var(--color-success-600); }
    .health-caution { color: var(--color-warning-600); }
    .health-risk { color: var(--color-error-600); }

    /* Stage badge */
    .stage-badge {
      display: inline-block;
      padding: 2px var(--space-2);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: var(--font-medium);
    }
    .stage-prospect { background: var(--color-gray-100); color: var(--color-gray-700); }
    .stage-welcomed { background: var(--color-info-100); color: var(--color-info-700); }
    .stage-exploring { background: var(--color-primary-100); color: var(--color-primary-700); }
    .stage-participating { background: var(--color-success-100); color: var(--color-success-700); }
    .stage-contributing { background: var(--color-warning-100); color: var(--color-warning-700); }
    .stage-leading { background: #9c27b020; color: #9c27b0; }

    .loading-spinner {
      text-align: center;
      padding: var(--space-8);
      color: var(--color-text-secondary);
    }
  </style>
</head>
<body>
  <div id="adcp-nav"></div>
  <div class="container">
    <h1>Outreach simulator</h1>
    <p class="subtitle">Test engagement rules against synthetic personas and assess historical behavior</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('assessment')">Historical assessment</button>
      <button class="tab" onclick="switchTab('simulation')">Simulation</button>
    </div>

    <!-- Assessment Tab -->
    <div class="tab-content active" id="tab-assessment">
      <div id="assessmentLoading" class="loading-spinner">Loading assessment...</div>
      <div id="assessmentContent" style="display:none;"></div>
    </div>

    <!-- Simulation Tab -->
    <div class="tab-content" id="tab-simulation">
      <div class="sim-controls">
        <label>Duration:
          <input type="number" id="simDuration" value="60" min="7" max="365"> days
        </label>
        <button class="btn btn-primary" id="runSimBtn" onclick="runSimulations()">Run all simulations</button>
      </div>
      <div id="simResults"></div>
    </div>
  </div>

  <div id="adcp-footer"></div>
  <script>
    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab-content#tab-${tab}`).classList.add('active');
      event.target.classList.add('active');
    }

    // ---- Assessment ----
    async function loadAssessment() {
      try {
        const res = await AdminSidebar.fetch('/api/admin/simulations/assessment');
        const data = await res.json();
        renderAssessment(data);
      } catch (e) {
        document.getElementById('assessmentLoading').textContent = 'Failed to load assessment';
        console.error(e);
      }
    }

    function renderAssessment(data) {
      const el = document.getElementById('assessmentContent');

      const stageRows = data.byStage.map(s => `
        <tr>
          <td><span class="stage-badge stage-${s.stage}">${escapeHtml(s.stage)}</span></td>
          <td>${s.count}</td>
          <td class="${s.avgUnreplied >= 2 ? 'health-risk' : s.avgUnreplied >= 1 ? 'health-caution' : 'health-good'}">${s.avgUnreplied}</td>
          <td class="${s.maxUnreplied >= 3 ? 'health-risk' : ''}">${s.maxUnreplied}</td>
          <td>${s.avgDaysSinceContact != null ? s.avgDaysSinceContact + 'd' : '-'}</td>
          <td class="${s.blockedCount > 0 ? 'health-risk' : ''}">${s.blockedCount}</td>
        </tr>
      `).join('');

      const overContactedRows = data.overContactedPeople.length > 0
        ? data.overContactedPeople.map(p => `
          <tr>
            <td>${escapeHtml(p.displayName || 'Unknown')}</td>
            <td><span class="stage-badge stage-${p.stage}">${escapeHtml(p.stage)}</span></td>
            <td class="health-risk">${p.unrepliedCount}</td>
            <td>${p.messagesSent}</td>
            <td>${p.messagesReceived}</td>
          </tr>
        `).join('')
        : '<tr><td colspan="5" style="text-align:center;color:var(--color-text-muted);">No over-contacted people</td></tr>';

      el.innerHTML = `
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value">${data.totalPeople}</div>
            <div class="stat-label">Total people</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${data.recentOutreachRate.last7d}</div>
            <div class="stat-label">Messages sent (7d)</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${data.recentOutreachRate.avgPerDay7d}</div>
            <div class="stat-label">Avg per day (7d)</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${data.recentOutreachRate.last30d}</div>
            <div class="stat-label">Messages sent (30d)</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${data.emailStats.totalSent30d}</div>
            <div class="stat-label">Emails sent (30d)</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${data.emailStats.uniqueRecipients30d}</div>
            <div class="stat-label">Email recipients (30d)</div>
          </div>
        </div>

        <div class="card">
          <h3>Behavior by stage</h3>
          <table class="data-table">
            <thead>
              <tr>
                <th>Stage</th>
                <th>People</th>
                <th>Avg unreplied</th>
                <th>Max unreplied</th>
                <th>Avg days since contact</th>
                <th>Blocked (3+ unreplied)</th>
              </tr>
            </thead>
            <tbody>${stageRows}</tbody>
          </table>
        </div>

        <div class="card">
          <h3>Over-contacted people (2+ unreplied)</h3>
          <table class="data-table">
            <thead>
              <tr>
                <th>Person</th>
                <th>Stage</th>
                <th>Unreplied</th>
                <th>Sent</th>
                <th>Received</th>
              </tr>
            </thead>
            <tbody>${overContactedRows}</tbody>
          </table>
        </div>
      `;

      document.getElementById('assessmentLoading').style.display = 'none';
      el.style.display = 'block';
    }

    // ---- Simulation ----
    async function runSimulations() {
      const btn = document.getElementById('runSimBtn');
      btn.disabled = true;
      btn.textContent = 'Running...';

      const duration = parseInt(document.getElementById('simDuration').value) || 60;
      const resultsEl = document.getElementById('simResults');
      resultsEl.innerHTML = '<div class="loading-spinner">Running simulations...</div>';

      try {
        const res = await AdminSidebar.fetch('/api/admin/simulations/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ durationDays: duration }),
        });
        const data = await res.json();
        renderSimulations(data.results, data.durationDays);
      } catch (e) {
        resultsEl.innerHTML = '<div class="loading-spinner">Failed to run simulations</div>';
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run all simulations';
      }
    }

    function renderSimulations(results, duration) {
      const el = document.getElementById('simResults');

      el.innerHTML = results.map(r => {
        const s = r.summary;
        const healthClass = s.totalContacts <= 3 ? 'health-good'
          : s.totalContacts <= 6 ? 'health-caution' : 'health-risk';

        // Build day-by-day timeline
        const dayMap = {};
        r.events.forEach(e => {
          if (!dayMap[e.day] || e.action === 'contacted' || e.action === 'person_responded') {
            dayMap[e.day] = e.action;
          }
        });

        let timelineHtml = '';
        for (let d = 0; d < duration; d++) {
          const action = dayMap[d] || 'empty';
          const cls = action === 'person_responded' ? 'responded' : action;
          timelineHtml += `<div class="sim-day ${cls}" title="Day ${d}: ${action}"></div>`;
        }

        return `
          <div class="sim-result">
            <div class="sim-result-header">
              <div>
                <div class="sim-persona-name">${escapeHtml(r.persona.name)}</div>
                <div class="sim-persona-desc">${escapeHtml(r.persona.description)}</div>
              </div>
              <span class="stage-badge stage-${s.finalStage}">${escapeHtml(s.finalStage)}</span>
            </div>

            <div class="sim-metrics">
              <div class="sim-metric">
                <div class="sim-metric-value ${healthClass}">${s.totalContacts}</div>
                <div class="sim-metric-label">Messages sent</div>
              </div>
              <div class="sim-metric">
                <div class="sim-metric-value">${s.personResponses}</div>
                <div class="sim-metric-label">Responses</div>
              </div>
              <div class="sim-metric">
                <div class="sim-metric-value">${s.totalBlocks}</div>
                <div class="sim-metric-label">Blocked days</div>
              </div>
              <div class="sim-metric">
                <div class="sim-metric-value">${s.averageDaysBetweenContacts || '-'}</div>
                <div class="sim-metric-label">Avg days between</div>
              </div>
              <div class="sim-metric">
                <div class="sim-metric-value">${s.finalUnreplied}</div>
                <div class="sim-metric-label">Final unreplied</div>
              </div>
            </div>

            <div class="sim-timeline">${timelineHtml}</div>
            <div class="sim-legend">
              <div class="sim-legend-item"><div class="sim-legend-dot" style="background:var(--color-primary-400)"></div> Contacted</div>
              <div class="sim-legend-item"><div class="sim-legend-dot" style="background:var(--color-success-400)"></div> Responded</div>
              <div class="sim-legend-item"><div class="sim-legend-dot" style="background:var(--color-error-200)"></div> Blocked</div>
              <div class="sim-legend-item"><div class="sim-legend-dot" style="background:var(--color-gray-100)"></div> Skipped</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Init
    loadAssessment();
  </script>
</body>
</html>
